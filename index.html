<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Journal — Blocco 6</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: #2a2a2e;
    --accent: #c8f135;
    --accent2: #f1c135;
    --red: #ff4d4d;
    --text: #e8e8ea;
    --muted: #6b6b72;
    --muted2: #9898a0;
    --good: #4dff91;
    --ok: #f1c135;
    --bad: #ff6b35;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 16px;
  }

  /* HEADER */
  .app-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  .header-sub {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .week-badge {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    color: var(--muted2);
    white-space: nowrap;
  }
  .week-badge span { color: var(--accent); font-weight: 600; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    padding: 16px 24px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 12px 20px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all .2s;
    text-transform: uppercase;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN */
  .main { padding: 20px 24px 80px; max-width: 900px; margin: 0 auto; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1.5px;
    color: var(--muted2);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* SESSION FORM */
  .session-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .form-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .day-selector { display: flex; gap: 6px; flex-wrap: wrap; }
  .day-btn {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: 1px;
  }
  .day-btn:hover { border-color: var(--accent); color: var(--text); }
  .day-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .date-input {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    outline: none;
  }

  /* EXERCISE CARDS IN FORM */
  .exercises-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .ex-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .ex-card:focus-within { border-color: #3a3a3e; }
  .ex-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .ex-name {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: .5px;
    text-transform: uppercase;
    flex: 1;
  }
  .ex-prescription {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    flex-shrink: 0;
  }
  .ex-toggle { font-size: 18px; color: var(--muted); transition: transform .2s; flex-shrink: 0; }
  .ex-card.open .ex-toggle { transform: rotate(90deg); }
  .ex-body {
    display: none;
    padding: 0 18px 18px;
    flex-direction: column;
    gap: 12px;
    animation: fadeIn .15s ease;
  }
  .ex-card.open .ex-body { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  /* SETS TABLE */
  .sets-section label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }
  .sets-table { width: 100%; border-collapse: collapse; }
  .sets-table th {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }
  .sets-table td { padding: 5px 4px; }
  .set-num {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    padding: 4px 8px;
    width: 32px;
  }
  .set-input {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 8px;
    border-radius: 6px;
    outline: none;
    width: 100%;
    text-align: center;
    transition: border-color .15s;
  }
  .set-input:focus { border-color: var(--accent); }
  .set-input::placeholder { color: var(--muted); font-size: 12px; }
  .add-set-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .15s;
    margin-top: 6px;
  }
  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* FEELING */
  .feeling-row { display: flex; flex-direction: column; gap: 8px; }
  .feeling-row label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .feeling-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .feel-btn {
    font-size: 22px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .feel-btn span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: block;
    text-align: center;
    margin-top: 3px;
  }
  .feel-btn:hover { border-color: var(--muted2); }
  .feel-btn.sel-1 { border-color: var(--red); background: rgba(255,77,77,.1); }
  .feel-btn.sel-2 { border-color: var(--bad); background: rgba(255,107,53,.1); }
  .feel-btn.sel-3 { border-color: var(--ok); background: rgba(241,193,53,.1); }
  .feel-btn.sel-4 { border-color: var(--accent); background: rgba(200,241,53,.1); }
  .feel-btn.sel-5 { border-color: var(--good); background: rgba(77,255,145,.1); }

  .notes-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    outline: none;
    resize: vertical;
    min-height: 64px;
    width: 100%;
    transition: border-color .15s;
    line-height: 1.5;
  }
  .notes-input:focus { border-color: var(--accent); }
  .notes-input::placeholder { color: var(--muted); }

  /* VIDEO */
  .video-row { display: flex; flex-direction: column; gap: 6px; }
  .video-row label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .video-input {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 8px;
    outline: none;
    width: 100%;
    transition: border-color .15s;
  }
  .video-input:focus { border-color: var(--accent2); }
  .video-input::placeholder { color: var(--muted); }

  /* TECH NOTE */
  .tech-note {
    background: rgba(200,241,53,.04);
    border: 1px solid rgba(200,241,53,.15);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .tech-note-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .tech-note-text { font-size: 13px; color: var(--muted2); line-height: 1.6; font-style: italic; }

  /* SAVE BTN */
  .form-footer {
    padding: 18px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .btn-save {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    font-size: 20px;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 32px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-save:hover { background: #d9ff50; transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }
  .btn-clear {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    background: none;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 12px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-clear:hover { color: var(--red); border-color: var(--red); }

  /* HISTORY */
  .history-empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    letter-spacing: 1px;
  }

  .session-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .entry-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .entry-header:hover { background: var(--surface2); }
  .entry-day-badge {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1.5px;
    font-size: 17px;
    background: var(--accent);
    color: #000;
    padding: 4px 12px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .entry-date { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted2); }
  .entry-week {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    color: var(--muted);
  }
  .entry-summary { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); flex: 1; text-align: right; }

  /* HISTORY BODY: full-width column layout, equal cards */
  .entry-body {
    display: none;
    padding: 16px;
    flex-direction: column;
    gap: 10px;
    border-top: 1px solid var(--border);
  }
  .entry-open .entry-body { display: flex; }

  /* Each exercise card in history: full width, equal size */
  .entry-ex {
    width: 100%;
    padding: 16px;
    background: var(--surface2);
    border-radius: 10px;
    border-left: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .entry-ex-name {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: .5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .entry-ex-prescription {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .feeling-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .f1 { background: var(--red); }
  .f2 { background: var(--bad); }
  .f3 { background: var(--ok); }
  .f4 { background: var(--accent); }
  .f5 { background: var(--good); }

  /* Sets in history: displayed in a column list */
  .sets-display {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .set-chip {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text);
    width: 100%;
  }
  .set-chip strong { color: var(--accent2); }

  .entry-note { font-size: 14px; color: var(--muted2); font-style: italic; line-height: 1.5; }
  .video-link {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent2);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .video-link:hover { text-decoration: underline; }

  /* PROGRESS VIEW */
  .progress-select {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    margin-bottom: 20px;
    width: 100%;
    max-width: 400px;
    cursor: pointer;
  }
  .progress-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .progress-card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .progress-card-title {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .chart-area { padding: 20px; position: relative; }
  .chart-empty { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); text-align: center; padding: 20px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; margin-bottom: 8px; }
  .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height .3s ease; min-height: 2px; }
  .bar-load { background: var(--accent); }
  .bar-e1rm { background: var(--accent2); opacity: .7; }
  .bar-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .bar-value { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted2); text-align: center; }
  .chart-legend { display: flex; gap: 16px; margin-top: 6px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .feeling-timeline { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px 20px 16px; }
  .feel-timeline-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .feel-timeline-item .bar-label { font-size: 10px; color: var(--muted); }

  /* DELETE */
  .btn-del {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 5px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-del:hover { color: var(--red); border-color: var(--red); }

  /* Week selector */
  .week-select {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
  }

  /* Notification */
  .notif {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    letter-spacing: 1px;
    padding: 12px 22px;
    border-radius: 8px;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s ease;
    pointer-events: none;
  }
  .notif.show { transform: translateY(0); opacity: 1; }

  .page { display: none; }
  .page.active { display: block; }

  .e1rm-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: rgba(241,193,53,.1);
    border: 1px solid rgba(241,193,53,.3);
    color: var(--accent2);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .entry-body > .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }

  /* COLOR THEME SWITCHER */
  .theme-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all .15s;
    flex-shrink: 0;
  }
  .theme-btn:hover, .theme-btn.active-theme { border-color: #fff; transform: scale(1.2); }
  .theme-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .theme-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-right: 4px;
  }
</style>
</head>
<body>

<div class="app-header">
  <div>
    <div class="header-title">TRAINING LOG</div>
    <div class="header-sub">BLOCCO 6 — LORE RETALI</div>
  </div>
  <div class="week-badge" id="currentWeekBadge">WEEK <span>—</span></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showPage('log')">📝 LOG SESSIONE</button>
  <button class="tab" onclick="showPage('history')">📋 STORICO</button>
  <button class="tab" onclick="showPage('progress')">📈 PROGRESSIONI</button>
</div>

<div class="theme-row">
  <span class="theme-label">COLORE</span>
  <button class="theme-btn active-theme" style="background:#c8f135" onclick="setTheme('lime')" title="Verde Lime"></button>
  <button class="theme-btn" style="background:#ff4d4d" onclick="setTheme('red')" title="Rosso"></button>
  <button class="theme-btn" style="background:#f1c135" onclick="setTheme('yellow')" title="Giallo"></button>
  <button class="theme-btn" style="background:#4dff91" onclick="setTheme('green')" title="Verde"></button>
  <button class="theme-btn" style="background:#ff6b35" onclick="setTheme('orange')" title="Arancione"></button>
  <button class="theme-btn" style="background:#e8e8ea" onclick="setTheme('white')" title="Bianco"></button>
  <button class="theme-btn" style="background:#9898a0" onclick="setTheme('grey')" title="Grigio"></button>
  <button class="theme-btn" style="background:#a855f7" onclick="setTheme('purple')" title="Viola"></button>
  <button class="theme-btn" style="background:#3b82f6" onclick="setTheme('blue')" title="Blu"></button>
</div>

<div class="main">

<!-- ======= PAGE: LOG ======= -->
<div id="page-log" class="page active">
  <div class="section-title">Nuova Sessione</div>
  <div class="session-form">
    <div class="form-header">
      <div class="day-selector" id="daySelector">
        <button class="day-btn active" data-day="1" onclick="selectDay(1)">GIORNO 1</button>
        <button class="day-btn" data-day="2" onclick="selectDay(2)">GIORNO 2</button>
        <button class="day-btn" data-day="3" onclick="selectDay(3)">GIORNO 3</button>
        <button class="day-btn" data-day="4" onclick="selectDay(4)">GIORNO 4</button>
        <button class="day-btn" data-day="5" onclick="selectDay(5)">GIORNO 5</button>
      </div>

// ============================================================
let currentDay = 1;
let sessions = JSON.parse(localStorage.getItem('b6_sessions') || '[]');

function save() { localStorage.setItem('b6_sessions', JSON.stringify(sessions)); }

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  document.getElementById('sessionDate').value = today.toISOString().split('T')[0];
  applyRandomTheme();
  detectCurrentWeek();
  renderExercises();
  renderHistory();
  populateProgressSelect();

  document.getElementById('weekSelect').addEventListener('change', function() {
    saveDraft();
    updateWeekBadge(this.value);
    renderExercises();
    restoreDraft();
  });
});

function detectCurrentWeek() {
  if (sessions.length === 0) { document.getElementById('weekSelect').value = 1; updateWeekBadge(1); return; }
  const lastW = sessions[sessions.length-1].week || 1;
  document.getElementById('weekSelect').value = lastW;
  updateWeekBadge(lastW);
}

function updateWeekBadge(w) {
  document.getElementById('currentWeekBadge').innerHTML = `WEEK <span>${w}</span>`;
}

// ============================================================
// DRAFT: salva i dati del form in memoria per ogni giorno
// ============================================================
const drafts = {}; // { day: { exId: { sets:[{load,reps,rir}], feeling, notes, video } } }

function saveDraft() {
  const week = parseInt(document.getElementById('weekSelect').value);
  const exs = PROGRAM[currentDay];
  if(!drafts[currentDay]) drafts[currentDay] = {};
  exs.forEach(ex => {
    const table = document.getElementById('sets_' + ex.id);
    const sets = [];
    if(table) {
      for(let i=1; i<table.rows.length; i++) {
        const load = document.getElementById(`load_${ex.id}_${i}`)?.value || '';
        const reps = document.getElementById(`reps_${ex.id}_${i}`)?.value || '';
        const rir  = document.getElementById(`rir_${ex.id}_${i}`)?.value  || '';
        sets.push({ load, reps, rir });
      }
    }
    const feelBtn = document.querySelector(`[data-ex="${ex.id}"][class*="sel-"]`);
    const feeling = feelBtn ? parseInt(feelBtn.dataset.val) : null;
    const notes = document.getElementById('notes_' + ex.id)?.value || '';
    const video = document.getElementById('video_' + ex.id)?.value || '';
    drafts[currentDay][ex.id] = { sets, feeling, notes, video };
  });
}

function restoreDraft() {
  const d = drafts[currentDay];
  if(!d) return;
  const exs = PROGRAM[currentDay];
  exs.forEach(ex => {
    const data = d[ex.id];
    if(!data) return;
    // Restore sets
    const table = document.getElementById('sets_' + ex.id);
    if(table && data.sets && data.sets.length > 0) {
      // Remove default rows and recreate
      while(table.rows.length > 1) table.deleteRow(1);
      data.sets.forEach((s, i) => {
        const setNum = i + 1;
        const row = table.insertRow();
        row.innerHTML = `
          <td class="set-num">${setNum}</td>
          <td><input class="set-input" placeholder="es. 80" type="number" step="0.5" id="load_${ex.id}_${setNum}" value="${s.load}"></td>
          <td><input class="set-input" placeholder="es. 8" type="number" id="reps_${ex.id}_${setNum}" value="${s.reps}"></td>
          <td><input class="set-input" placeholder="0-3" type="number" min="0" max="5" id="rir_${ex.id}_${setNum}" value="${s.rir}"></td>
        `;
      });
    }
    // Restore feeling
    if(data.feeling) setFeeling(ex.id, data.feeling);
    // Restore notes
    const notesEl = document.getElementById('notes_' + ex.id);
    if(notesEl) notesEl.value = data.notes || '';
    // Restore video
    const videoEl = document.getElementById('video_' + ex.id);
    if(videoEl) videoEl.value = data.video || '';
  });
}

// ============================================================
// RENDER EXERCISE FORM
// ============================================================
function selectDay(d) {
  saveDraft(); // salva il giorno corrente prima di cambiare
  currentDay = d;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.day) === d));
  renderExercises();
  restoreDraft(); // ripristina i dati del nuovo giorno se esistono
}

function renderExercises() {
  const week = parseInt(document.getElementById('weekSelect').value);
  const exs = PROGRAM[currentDay];
  const container = document.getElementById('exercisesList');
  container.innerHTML = '';
  exs.forEach((ex, i) => {
    const card = document.createElement('div');
    card.className = 'ex-card';
    card.id = 'card_' + ex.id;
    card.innerHTML = `
      <div class="ex-header" onclick="toggleCard('${ex.id}')">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-prescription">${ex.weeks[week] || ''}<br><span style="color:var(--muted);font-size:9px">TEMPO ${ex.tempo}</span></div>
        <div class="ex-toggle">›</div>
      </div>
      <div class="ex-body">
        <div class="tech-note">
          <div class="tech-note-icon">📌</div>
          <div class="tech-note-text">${ex.note}</div>
        </div>
        <div class="sets-section">
          <label>SERIE LOG</label>
          <table class="sets-table" id="sets_${ex.id}">
            <tr>
              <th>#</th><th>CARICO (kg)</th><th>REPS</th><th>RIR</th>
            </tr>
          </table>
          <button class="add-set-btn" onclick="addSet('${ex.id}')">+ AGGIUNGI SERIE</button>
        </div>
        <div class="feeling-row">
          <label>FEELING SULL'ESERCIZIO</label>
          <div class="feeling-btns" id="feel_${ex.id}">
            ${[1,2,3,4,5].map(n => `<button class="feel-btn" data-ex="${ex.id}" data-val="${n}" onclick="setFeeling('${ex.id}',${n})">
              ${n===1?'💀':n===2?'😤':n===3?'😐':n===4?'💪':'🔥'}
              <span>${n===1?'PESSIMO':n===2?'FATICOSO':n===3?'NEUTRO':n===4?'BUONO':'OTTIMO'}</span>
            </button>`).join('')}
          </div>
        </div>
        <div class="video-row">
          <label>🎥 LINK VIDEO (opzionale)</label>
          <input class="video-input" id="video_${ex.id}" placeholder="https://... (YouTube, Drive, WhatsApp link...)" type="text">
        </div>
        <div>
          <label style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px;">NOTE SESSIONE</label>
          <textarea class="notes-input" id="notes_${ex.id}" placeholder="Come ti sei sentito? Tecnica, dolori, sensazioni..."></textarea>
        </div>
      </div>
    `;
    container.appendChild(card);
    // Add 3 default set rows
    for(let s=0;s<3;s++) addSet(ex.id);
  });
}

function toggleCard(id) {
  const card = document.getElementById('card_' + id);
  card.classList.toggle('open');
}

function addSet(exId) {
  const table = document.getElementById('sets_' + exId);
  const rowCount = table.rows.length; // includes header
  const setNum = rowCount; // 1-indexed
  const row = table.insertRow();
  row.innerHTML = `
    <td class="set-num">${setNum}</td>
    <td><input class="set-input" placeholder="es. 80" type="number" step="0.5" id="load_${exId}_${setNum}"></td>
    <td><input class="set-input" placeholder="es. 8" type="number" id="reps_${exId}_${setNum}"></td>
    <td><input class="set-input" placeholder="0-3" type="number" min="0" max="5" id="rir_${exId}_${setNum}"></td>
  `;
}

function setFeeling(exId, val) {
  document.querySelectorAll(`[data-ex="${exId}"]`).forEach(b => {
    b.className = 'feel-btn';
    if(parseInt(b.dataset.val) === val) b.classList.add('sel-' + val);
  });
}

// ============================================================
// SAVE
// ============================================================
function saveSession() {
  const week = parseInt(document.getElementById('weekSelect').value);
  const date = document.getElementById('sessionDate').value || new Date().toISOString().split('T')[0];
  const exs = PROGRAM[currentDay];
  const exerciseData = [];

  exs.forEach(ex => {
    const table = document.getElementById('sets_' + ex.id);
    if(!table) return;
    const sets = [];
    for(let i=1; i<table.rows.length; i++) {
      const load = table.rows[i].querySelector(`#load_${ex.id}_${i}`)?.value;
      const reps = table.rows[i].querySelector(`#reps_${ex.id}_${i}`)?.value;
      const rir = table.rows[i].querySelector(`#rir_${ex.id}_${i}`)?.value;
      if(load || reps) sets.push({ load: parseFloat(load)||0, reps: parseInt(reps)||0, rir: parseInt(rir)||0 });
    }
    const feelBtn = document.querySelector(`[data-ex="${ex.id}"][class*="sel-"]`);
    const feeling = feelBtn ? parseInt(feelBtn.dataset.val) : null;
    const notes = document.getElementById('notes_' + ex.id)?.value || '';
    const video = document.getElementById('video_' + ex.id)?.value || '';
    exerciseData.push({ id: ex.id, name: ex.name, sets, feeling, notes, video, prescription: ex.weeks[week] });
  });

  const session = { id: Date.now(), date, week, day: currentDay, exercises: exerciseData };
  sessions.push(session);
  save();
  if(drafts[currentDay]) delete drafts[currentDay];
  showNotif('✅ Sessione salvata!');
  renderHistory();
  populateProgressSelect();
  renderExercises();
}

function clearForm() {
  if(drafts[currentDay]) delete drafts[currentDay];
  renderExercises();
  showNotif('Form resettato');
}

// ============================================================
// HISTORY
// ============================================================
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['log','history','progress'][i] === name));
  if(name === 'history') renderHistory();
  if(name === 'progress') renderProgress();
}

function renderHistory() {
  const container = document.getElementById('historyContainer');
  if(sessions.length === 0) {
    container.innerHTML = '<div class="history-empty">NESSUNA SESSIONE SALVATA<br><br>Inizia a loggare dal tab LOG SESSIONE</div>';
    return;
  }
  const sorted = [...sessions].reverse();
  container.innerHTML = sorted.map(s => {
    const filledEx = s.exercises.filter(e => e.sets.some(set => set.load||set.reps));
    const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    return `
    <div class="session-entry" id="entry_${s.id}">
      <div class="entry-header" onclick="toggleEntry(${s.id})">
        <div class="entry-day-badge">G${s.day}</div>
        <div class="entry-date">${formatDate(s.date)}</div>
        <div class="entry-week">W${s.week}</div>
        <div class="entry-summary">${filledEx.length}/${s.exercises.length} esercizi</div>
        <button class="btn-del" onclick="event.stopPropagation();deleteSession(${s.id})">🗑</button>
      </div>
      <div class="entry-body">
        ${s.exercises.map(ex => {
          if(!ex.sets.some(set=>set.load||set.reps) && !ex.notes && !ex.feeling) return '';
          const e1rmTop = ex.sets.reduce((max, set) => {
            if(!set.load||!set.reps) return max;
            const e = calcE1RM(set.load, set.reps, set.rir||0);
            return e > max ? e : max;
          }, 0);
          const feelEmoji = ex.feeling ? (ex.feeling===1?'💀':ex.feeling===2?'😤':ex.feeling===3?'😐':ex.feeling===4?'💪':'🔥') : '';
          const feelLabel = ex.feeling ? FEELING_LABELS[ex.feeling] : '';
          return `
          <div class="entry-ex">
            <div class="entry-ex-name">
              ${ex.name}
              ${ex.feeling ? `<span class="feeling-dot f${ex.feeling}" title="${feelLabel}"></span>` : ''}
              ${e1rmTop > 0 ? `<span class="e1rm-chip">~1RM: ${e1rmTop}kg</span>` : ''}
            </div>
            ${ex.feeling ? `<div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted2);">${feelEmoji} ${feelLabel}</div>` : ''}
            <div class="entry-ex-prescription">📋 ${ex.prescription||''}</div>
            <div class="sets-display">
              ${ex.sets.map((set,i) => set.load||set.reps ? `<div class="set-chip">Serie ${i+1} — <strong>${set.load}kg</strong> × ${set.reps} reps${set.rir!==undefined&&set.rir!==''?` — RIR ${set.rir}`:''}</div>` : '').filter(Boolean).join('')}
            </div>
            ${ex.notes ? `<div class="entry-note">"${ex.notes}"</div>` : ''}
            ${ex.video ? `<a class="video-link" href="${ex.video}" target="_blank">🎥 Guarda video</a>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleEntry(id) {
  document.getElementById('entry_' + id)?.classList.toggle('entry-open');
}

function deleteSession(id) {
  sessions = sessions.filter(s => String(s.id) !== String(id));
  save();
  renderHistory();
  populateProgressSelect();
  showNotif('🗑 Sessione eliminata');
}

// ============================================================
// PROGRESS
// ============================================================
function populateProgressSelect() {
  const sel = document.getElementById('progressExSelect');
  const existing = sel.value;
  // Collect all exercise ids from all sessions
  const exMap = {};
  sessions.forEach(s => s.exercises.forEach(e => { if(!exMap[e.id]) exMap[e.id] = e.name; }));
  sel.innerHTML = '<option value="">— Seleziona esercizio —</option>';
  Object.entries(exMap).forEach(([id, name]) => {
    const opt = document.createElement('option');
    opt.value = id; opt.textContent = name;
    sel.appendChild(opt);
  });
  if(existing) sel.value = existing;
}

function renderProgress() {
  const exId = document.getElementById('progressExSelect').value;
  const container = document.getElementById('progressContainer');
  if(!exId) { container.innerHTML = ''; return; }

  const logs = [];
  sessions.forEach(s => {
    const ex = s.exercises.find(e => e.id === exId);
    if(!ex) return;
    const topLoad = ex.sets.reduce((m,set) => set.load > m ? set.load : m, 0);
    const topE1RM = ex.sets.reduce((m,set) => {
      if(!set.load||!set.reps) return m;
      const e = calcE1RM(set.load, set.reps, set.rir||0);
      return e > m ? e : m;
    }, 0);
    const totalVolume = ex.sets.reduce((sum,set) => sum + (set.load||0)*(set.reps||0), 0);
    logs.push({ date: s.date, week: s.week, day: s.day, topLoad, topE1RM, feeling: ex.feeling, notes: ex.notes, sets: ex.sets, totalVolume, prescription: ex.prescription });
  });
  logs.sort((a,b) => a.date.localeCompare(b.date));

  if(logs.length === 0) { container.innerHTML = '<div class="chart-empty" style="font-family:\'DM Mono\',monospace;font-size:13px;color:var(--muted);text-align:center;padding:40px">Nessun dato ancora per questo esercizio.</div>'; return; }

  const exName = document.getElementById('progressExSelect').options[document.getElementById('progressExSelect').selectedIndex].text;
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#c8f135';
  const accent2 = getComputedStyle(document.documentElement).getPropertyValue('--accent2').trim() || '#f1c135';

  // --- STATS SUMMARY ---
  const best1RM = Math.max(...logs.map(l=>l.topE1RM));
  const bestLoad = Math.max(...logs.map(l=>l.topLoad));
  const lastFeeling = logs[logs.length-1].feeling;
  const feelEmoji = f => f===1?'💀':f===2?'😤':f===3?'😐':f===4?'💪':'🔥';
  const delta1RM = logs.length > 1 ? (logs[logs.length-1].topE1RM - logs[0].topE1RM) : 0;
  const deltaSign = delta1RM >= 0 ? '+' : '';

  // --- SVG LINE CHART helper ---
  function makeSVG(dataPoints, color, label, unit='kg') {
    const W = 500, H = 120, PL = 44, PR = 16, PT = 16, PB = 32;
    const cw = W - PL - PR, ch = H - PT - PB;
    const n = dataPoints.length;
    if(n === 0) return '';
    const minV = Math.min(...dataPoints) * 0.92;
    const maxV = Math.max(...dataPoints) * 1.05;
    const range = maxV - minV || 1;
    const xs = dataPoints.map((_, i) => PL + (n === 1 ? cw/2 : i * cw / (n-1)));
    const ys = dataPoints.map(v => PT + ch - ((v - minV) / range) * ch);

    // grid lines
    const gridVals = [minV, minV + range*0.33, minV + range*0.66, maxV];
    const grids = gridVals.map(v => {
      const y = PT + ch - ((v - minV) / range) * ch;
      return `<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="#2a2a2e" stroke-width="1"/>
              <text x="${PL-4}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="#6b6b72" font-size="9" font-family="monospace">${Math.round(v)}</text>`;
    }).join('');

    // polyline
    const pts = xs.map((x,i) => `${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');

    // area fill
    const areaD = `M${xs[0].toFixed(1)},${(PT+ch).toFixed(1)} ` +
      xs.map((x,i) => `L${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ') +
      ` L${xs[n-1].toFixed(1)},${(PT+ch).toFixed(1)} Z`;

    // dots + labels
    const dots = xs.map((x,i) => `
      <circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="4" fill="${color}" stroke="#0e0e0f" stroke-width="2"/>
      <text x="${x.toFixed(1)}" y="${(ys[i]-8).toFixed(1)}" text-anchor="middle" fill="${color}" font-size="9" font-family="monospace" font-weight="bold">${dataPoints[i]}${unit}</text>
    `).join('');

    // x labels
    const xlabels = xs.map((x,i) => `<text x="${x.toFixed(1)}" y="${(H-4).toFixed(1)}" text-anchor="middle" fill="#6b6b72" font-size="9" font-family="monospace">${formatDateShort(logs[i].date)}</text>`).join('');

    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">
      <defs>
        <linearGradient id="grad_${label.replace(/\s/g,'')}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${grids}
      <path d="${areaD}" fill="url(#grad_${label.replace(/\s/g,'')})" />
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      ${xlabels}
    </svg>`;
  }

  // feeling bar chart
  function feelingBars() {
    if(!logs.some(l=>l.feeling)) return '';
    const W=500, H=80, PL=30, PR=16, PT=8, PB=24;
    const cw = W-PL-PR, ch = H-PT-PB;
    const n = logs.length;
    const barW = Math.min(32, cw/n - 4);
    const colors = {1:'#ff4d4d',2:'#ff6b35',3:'#f1c135',4:accent,5:'#4dff91'};
    const bars = logs.map((l,i) => {
      if(!l.feeling) return '';
      const x = PL + (n===1 ? cw/2 : i*cw/(n-1)) - barW/2;
      const barH = (l.feeling/5)*ch;
      const y = PT + ch - barH;
      const emoji = feelEmoji(l.feeling);
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${barH.toFixed(1)}" rx="4" fill="${colors[l.feeling]}" opacity="0.85"/>
              <text x="${(x+barW/2).toFixed(1)}" y="${(H-6).toFixed(1)}" text-anchor="middle" fill="#6b6b72" font-size="9" font-family="monospace">${formatDateShort(l.date)}</text>
              <text x="${(x+barW/2).toFixed(1)}" y="${(y-3).toFixed(1)}" text-anchor="middle" font-size="13">${emoji}</text>`;
    }).join('');
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">${bars}</svg>`;
  }

  // volume bars
  function volumeBars() {
    const vols = logs.map(l=>l.totalVolume);
    if(!vols.some(v=>v>0)) return '';
    const W=500, H=100, PL=50, PR=16, PT=16, PB=24;
    const cw=W-PL-PR, ch=H-PT-PB;
    const n=logs.length, maxV=Math.max(...vols,1);
    const barW=Math.min(36, cw/n-4);
    const bars = logs.map((l,i)=>{
      const x = PL + (n===1?cw/2:i*cw/(n-1)) - barW/2;
      const bh = (l.totalVolume/maxV)*ch;
      const y = PT+ch-bh;
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${bh.toFixed(1)}" rx="3" fill="${accent2}" opacity="0.75"/>
              <text x="${(x+barW/2).toFixed(1)}" y="${(y-3).toFixed(1)}" text-anchor="middle" fill="${accent2}" font-size="9" font-family="monospace">${Math.round(l.totalVolume)}</text>
              <text x="${(x+barW/2).toFixed(1)}" y="${(H-6).toFixed(1)}" text-anchor="middle" fill="#6b6b72" font-size="9" font-family="monospace">${formatDateShort(l.date)}</text>`;
    }).join('');
    const gridMax = `<line x1="${PL}" y1="${PT}" x2="${W-PR}" y2="${PT}" stroke="#2a2a2e" stroke-width="1"/>
      <text x="${PL-4}" y="${PT+4}" text-anchor="end" fill="#6b6b72" font-size="9" font-family="monospace">${Math.round(maxV)}</text>`;
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">${gridMax}${bars}</svg>`;
  }

  const chartBlock = (title, svgContent) => svgContent ? `
    <div style="padding:16px 20px;border-bottom:1px solid var(--border)">
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:12px;text-transform:uppercase">${title}</div>
      <div style="overflow-x:auto">${svgContent}</div>
    </div>` : '';

  container.innerHTML = `
  <div class="progress-card">

    <!-- HEADER -->
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="font-family:'DM Mono',monospace;font-size:13px;color:${accent};letter-spacing:.5px;text-transform:uppercase">${exName}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div style="font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:6px;color:var(--muted2)">
          BEST ~1RM <span style="color:${accent};font-weight:700">${best1RM}kg</span>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:6px;color:var(--muted2)">
          TOP CARICO <span style="color:${accent2};font-weight:700">${bestLoad}kg</span>
        </div>
        ${logs.length > 1 ? `<div style="font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:6px;color:var(--muted2)">
          ΔRIP <span style="color:${delta1RM>=0?'#4dff91':'#ff4d4d'};font-weight:700">${deltaSign}${delta1RM}kg</span>
        </div>` : ''}
        ${lastFeeling ? `<div style="font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:4px 10px;border-radius:6px;">
          ${feelEmoji(lastFeeling)} ULTIMO
        </div>` : ''}
      </div>
    </div>

    <!-- ~1RM LINE CHART -->
    ${chartBlock('📈 ~1RM STIMATO NEL TEMPO', makeSVG(logs.map(l=>l.topE1RM), accent, '1rm'))}

    <!-- CARICO TOP SET LINE CHART -->
    ${chartBlock('🏋️ CARICO TOP SET NEL TEMPO', makeSVG(logs.map(l=>l.topLoad), accent2, 'load'))}

    <!-- VOLUME BARS -->
    ${chartBlock('📦 VOLUME TOTALE PER SESSIONE (kg×reps)', volumeBars())}

    <!-- FEELING BARS -->
    ${chartBlock('😤 FEELING NEL TEMPO', feelingBars())}

    <!-- DETTAGLIO SESSIONI -->
    <div style="padding:16px 20px">
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:14px;text-transform:uppercase">📋 Dettaglio sessioni</div>
      ${logs.map(l => `
        <div style="margin-bottom:14px;padding:14px;background:var(--surface2);border-radius:10px;border-left:3px solid ${accent}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
            <span style="font-family:'DM Mono',monospace;font-size:12px;color:${accent2};font-weight:600">${formatDate(l.date)} — W${l.week} G${l.day}</span>
            ${l.feeling ? `<span style="font-size:16px">${feelEmoji(l.feeling)}</span>` : ''}
            ${l.topE1RM > 0 ? `<span class="e1rm-chip">~1RM: ${l.topE1RM}kg</span>` : ''}
            ${l.totalVolume > 0 ? `<span style="font-family:'DM Mono',monospace;font-size:10px;background:var(--surface);border:1px solid var(--border);padding:2px 8px;border-radius:4px;color:var(--muted)">Vol: ${Math.round(l.totalVolume)} kg·r</span>` : ''}
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:8px">📋 ${l.prescription||''}</div>
          <div style="display:flex;flex-direction:column;gap:4px">
            ${l.sets.map((set,i) => set.load||set.reps ? `
              <div style="font-family:'DM Mono',monospace;font-size:13px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--text)">
                Serie ${i+1} — <strong style="color:${accent2}">${set.load}kg</strong> × ${set.reps} reps${set.rir!==undefined&&set.rir!==''?` — RIR ${set.rir}`:''}
                ${set.load&&set.reps ? `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-left:8px">~1RM ${calcE1RM(set.load,set.reps,set.rir||0)}kg</span>` : ''}
              </div>` : '').filter(Boolean).join('')}
          </div>
          ${l.notes ? `<div style="font-size:13px;color:var(--muted2);font-style:italic;margin-top:8px;line-height:1.5">"${l.notes}"</div>` : ''}
        </div>
      `).join('')}
    </div>
  </div>`;
}

// ============================================================
// THEME
// ============================================================
const THEMES = {
  lime:   { accent: '#c8f135', accent2: '#f1c135', textOnAccent: '#000' },
  red:    { accent: '#ff4d4d', accent2: '#ff8080', textOnAccent: '#fff' },
  yellow: { accent: '#f1c135', accent2: '#f1e035', textOnAccent: '#000' },
  green:  { accent: '#4dff91', accent2: '#35f1c8', textOnAccent: '#000' },
  orange: { accent: '#ff6b35', accent2: '#ffaa35', textOnAccent: '#fff' },
  white:  { accent: '#e8e8ea', accent2: '#c8c8cc', textOnAccent: '#000' },
  grey:   { accent: '#9898a0', accent2: '#c0c0c8', textOnAccent: '#000' },
  purple: { accent: '#a855f7', accent2: '#c084fc', textOnAccent: '#fff' },
  blue:   { accent: '#3b82f6', accent2: '#60a5fa', textOnAccent: '#fff' },
};

function setTheme(name) {
  const t = THEMES[name];
  if(!t) return;
  const r = document.documentElement.style;
  r.setProperty('--accent', t.accent);
  r.setProperty('--accent2', t.accent2);
  // Update day-btn active and save-btn text color dynamically
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active-theme'));
  const btn = document.querySelector(`.theme-btn[onclick="setTheme('${name}')"]`);
  if(btn) btn.classList.add('active-theme');
  localStorage.setItem('b6_theme', name);
  // update entry-ex border-left color
  document.querySelectorAll('.entry-ex').forEach(el => el.style.borderLeftColor = t.accent);
}

function applyRandomTheme() {
  const saved = localStorage.getItem('b6_theme');
  if(saved && THEMES[saved]) { setTheme(saved); return; }
  const keys = Object.keys(THEMES);
  setTheme(keys[Math.floor(Math.random() * keys.length)]);
}

// ============================================================
// UTILS
// ============================================================
function calcE1RM(load, reps, rir) {
  // Epley formula adjusted for RIR
  const effectiveReps = reps + (rir || 0);
  if(effectiveReps <= 1) return load;
  return Math.round(load * (1 + effectiveReps / 30));
}

function formatDate(d) {
  if(!d) return '';
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}
function formatDateShort(d) {
  if(!d) return '';
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}`;
}

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2500);
}
</script>
